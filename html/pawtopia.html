<body>

<header>
    <nav>
        <div class="logo">
            <img src="logo.png"><h1 style="color:rgb(45, 74, 74)">PAW HEAVEN</h1>
        </div>
        <div class="nav-links">
            <ul>
                <li><a href="home.html">Home</a></li>

                <li><a href="pawtopia.html">Pawtopia</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </div>
        <div class="nav-icons">
            <a href="signup.html"><i class="fas fa-user-circle"  ></i></a>
        </div>
    </nav>
</header>

<!-- ---------------------------------------------------------------------------- -->
<section class="about">
    <div class="about-content">
        <div class="animated-text">
        <br><br><br><h1>Pawtopia</h1></div>
    </div>
</section>

<!-- ------------------------ Filter Section ------------------------ -->
<section class="filter-section">
    <div class="filter-container">
        <select id="location-filter">
            <option value="">Select Location</option>
            <option value="city1">City 1</option>
            <option value="city2">City 2</option>
            <option value="city3">City 3</option>
        </select>
        
        <select id="breed-filter">
            <option value="">Select Breed</option>
            <option value="breed1">Breed 1</option>
            <option value="breed2">Breed 2</option>
            <option value="breed3">Breed 3</option>
        </select>
        
        <select id="color-filter">
            <option value="">Select Color</option>
            <option value="color1">Color 1</option>
            <option value="color2">Color 2</option>
            <option value="color3">Color 3</option>
        </select>
        
        <button class="filter-btn" id="apply-filters-btn">Apply Filters</button>
    </div>
</section>

<!-- ------------------------ Gallery Section ------------------------ -->

<!-- ------------------------ Footer ------------------------ -->
<footer>
    <div class="footer">
        <br> <p style="font-size: 35px;font-weight: bold;">Paw Heaven</p><br>
        <div class="social-icons">
            <a href="#"><i class="fa-brands fa-instagram"></i></a>
            <a href="#"><i class="fa-brands fa-facebook"></i></a>
            <a href="#"><i class="fa-brands fa-whatsapp"></i></a>
            <a href="#"><i class="fa-brands fa-twitter"></i></a>
        </div>
        <br><p>Copyright &copy; 2024 Paw Heaven</p>
    </div>
</footer>
<!-- -----------------------js------------------------------- -->

<script>
    document.addEventListener("DOMContentLoaded", function () {
        fetch("fetch_pets.php")
            .then(response => response.json())
            .then(data => {
                const galleryContainer = document.querySelector(".gallery-container");
                galleryContainer.innerHTML = "";

                data.forEach(pet => {
                    const petItem = document.createElement("div");
                    petItem.classList.add("gallery-item");

                    // Ensure proper encoding of query parameters
                    const queryParams = new URLSearchParams({
                        name: pet.name,
                        age: pet.age,
                        breed: pet.breed,
                        color: pet.color,
                        gender: pet.gender,
                        vaccination: pet.vaccination,
                        status: pet.adoption_status,
                        image: pet.photo,
                        description :pet.description
                
                    }).toString();

                    const petDetailsURL = `image-details.html?${queryParams}`;

                    petItem.innerHTML = `
                        <a href="${petDetailsURL}">
                            <img src="${pet.photo}" alt="${pet.name}">
                            <div class="info">
                                <h3>${pet.name}</h3>
                                <p><strong>Age:</strong> ${pet.age} years</p>
                                <p><strong>Breed:</strong> ${pet.breed}</p>
                                <p><strong>Color:</strong> ${pet.color}</p>
                                <p><strong>Gender:</strong> ${pet.gender}</p>
                                <p><strong>Vaccination Status:</strong> ${pet.vaccination}</p>
                                <span class="status">${pet.adoption_status}</span>
                                <span class="description">${pet.description}</span>
                            </div>
                        </a>
                    `;

                    galleryContainer.appendChild(petItem);
                });
            })
            .catch(error => console.error("Error fetching pets:", error));
    });

    
</script>


    
</body>
</html>
