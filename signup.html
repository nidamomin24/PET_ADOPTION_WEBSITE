<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign Up</title>
    <link rel="stylesheet" href="assets/css/signup.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>

<div class="container">
    <div class="left-side">
        <!-- Left side background (can be an image or a color) -->
    </div>
    <div class="right-side">
        <div class="form-box">
            <h1 id="title">Sign Up</h1>
            <form action="signup.php" method="POST" id="signupForm">
                <div class="input-group">
                    <div class="input-field">
                        <i class="fa fa-user"></i>
                        <input type="text" name="name" placeholder="Name" required>
                    </div>
                    <div class="input-field">
                        <i class="fa fa-envelope"></i>
                        <input type="email" name="email" placeholder="Email" required>
                    </div>
                    <div class="input-field">
                        <i class="fa fa-phone"></i>
                        <select name="country_code" required>
                            <option value="+91"> +91 (India)</option>
                            <option value="+1"> +1 (USA)</option>
                            <option value="+44"> +44 (UK)</option>
                            <option value="+61"> +61 (Australia)</option>
                            <option value="+81"> +81 (Japan)</option>
                            <option value="+49"> +49 (Germany)</option>
                            <option value="+33"> +33 (France)</option>
                            <option value="+55"> +55 (Brazil)</option>
                        </select> 
                        <input type="text" name="phone" placeholder="Phone number" required>
                    </div>
                    <div class="input-field">
                        <i class="fa fa-lock"></i>
                        <input type="password" name="password" placeholder="At least 6 characters" required>
                    </div>
                    
                    <!-- Account Type Selection -->
                    <div class="input-field">
                        <i class="fa fa-user-tag"></i>
                        <select name="select_opt" required>
                            <option value="" disabled selected>Select Account Type</option>
                            <option value="User">User</option>
                            <option value="Shelter">Shelter</option>
                        </select>
                    </div>

                    <div id="account-link">
                        Already have an account? <a href="signin.html">Sign In</a>
                    </div>
                </div>
                <div class="btn-field">
                    <button type="submit" id="signupBtn">Sign Up</button>
                    <button type="button" id="signinBtn" class="disable">Sign In</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    let signupForm = document.getElementById("signupForm");

    signupForm.addEventListener("submit", function(event) {
        event.preventDefault(); // Prevent default form submission

        // Animate fields before redirection
        document.querySelectorAll('.input-field').forEach((field) => {
            field.style.transition = "max-height 0.5s ease-in-out, opacity 0.5s";
            field.style.maxHeight = "0";
            field.style.opacity = "0";
        });

        // Delay form submission for animation to complete
        setTimeout(function() {
            signupForm.submit(); // Submit the form after animation
        }, 500); // Adjust delay as per animation duration
    });

    let signinBtn = document.getElementById("signinBtn");
    let title = document.getElementById("title");
    let accountLink = document.getElementById("account-link");

    signinBtn.onclick = function() {
        document.querySelectorAll('.input-field').forEach((field) => {
            field.style.transition = "max-height 0.5s ease-in-out";
            field.style.maxHeight = "0";
        });

        title.innerHTML = "Sign In";
        accountLink.innerHTML = "Don't have an account? <a href='signup.html'>Sign Up</a>";

        setTimeout(function() {
            window.location.href = "signin.html"; 
        }, 300);
    };
</script>

</body>
</html>
